<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocación = Talento + Pasión + Servicio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6 md:p-12">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-3xl font-bold text-gray-800 uppercase tracking-wide">Plan de Vida y Carrera</h1>
            <p class="text-gray-600 mt-2">Ingresa tus respuestas en cada categoría</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="bg-blue-600 rounded-xl shadow-lg overflow-hidden flex flex-col">
                <div class="p-4 bg-blue-700">
                    <h2 class="text-white text-xl font-bold text-center uppercase">Tu Talento</h2>
                </div>
                <div class="p-6 space-y-4 flex-grow">
                    <input type="text" placeholder="1. Escribe aquí..." class="w-full p-3 rounded-lg border-none focus:ring-4 focus:ring-blue-300 outline-none shadow-inner">
                    <input type="text" placeholder="2. Escribe aquí..." class="w-full p-3 rounded-lg border-none focus:ring-4 focus:ring-blue-300 outline-none shadow-inner">
                    <input type="text" placeholder="3. Escribe aquí..." class="w-full p-3 rounded-lg border-none focus:ring-4 focus:ring-blue-300 outline-none shadow-inner">
                </div>
            </div>

            <div class="bg-orange-500 rounded-xl shadow-lg overflow-hidden flex flex-col">
                <div class="p-4 bg-orange-600">
                    <h2 class="text-white text-xl font-bold text-center uppercase">Tu Pasión</h2>
                </div>
                <div class="p-6 space-y-4 flex-grow">
                    <input type="text" placeholder="1. Escribe aquí..." class="w-full p-3 rounded-lg border-none focus:ring-4 focus:ring-orange-200 outline-none shadow-inner">
                    <input type="text" placeholder="2. Escribe aquí..." class="w-full p-3 rounded-lg border-none focus:ring-4 focus:ring-orange-200 outline-none shadow-inner">
                    <input type="text" placeholder="3. Escribe aquí..." class="w-full p-3 rounded-lg border-none focus:ring-4 focus:ring-orange-200 outline-none shadow-inner">
                </div>
            </div>

            <div class="bg-green-600 rounded-xl shadow-lg overflow-hidden flex flex-col">
                <div class="p-4 bg-green-700">
                    <h2 class="text-white text-xl font-bold text-center uppercase">El Servicio</h2>
                </div>
                <div class="p-6 space-y-4 flex-grow">
                    <input type="text" placeholder="1. Escribe aquí..." class="w-full p-3 rounded-lg border-none focus:ring-4 focus:ring-green-300 outline-none shadow-inner">
                    <input type="text" placeholder="2. Escribe aquí..." class="w-full p-3 rounded-lg border-none focus:ring-4 focus:ring-green-300 outline-none shadow-inner">
                    <input type="text" placeholder="3. Escribe aquí..." class="w-full p-3 rounded-lg border-none focus:ring-4 focus:ring-green-300 outline-none shadow-inner">
                </div>
            </div>

        </div>

        <div class="mt-12 text-center no-print">
            <button onclick="window.print()" class="bg-gray-800 hover:bg-black text-white font-bold py-3 px-8 rounded-full transition duration-300 shadow-md">
                Finalizar y Guardar PDF
            </button>
        </div>
    </div>

    <style>
        /* Estilo para que al imprimir se vean los colores de fondo */
        @media print {
            body { background-color: white !important; }
            .no-print { display: none; }
            .shadow-lg { shadow: none !important; }
            * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>

</body>
</html>
